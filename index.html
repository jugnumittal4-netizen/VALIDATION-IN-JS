<!DOCTYPE html>
<html>
    <body>
        <form name = "my form" onsubmit=" return validateForm()">
            name: <input type="text" name="fname"><br>
            age: <input id="id1" type="number" min="18"><br>
            <input type="submit" value="login">


        </form>
        <p  id ="message"></p>
        <script>
            function validateForm(){
                var x= document.forms["my form"]["fname"].value;
                var y= document.getElementById("id1").value;
                if(x=="" || y==""){
                    alert("all fields must be filled out");
                    return false;
                }
                else {alert("welcome " + x);}

            }
        </script>
    </body>
</html>
