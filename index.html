<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <p> Please Enter A Number And Click OK</p>
        <input type="number" id="num" min = "100" max = "300" required>
        <button onclick="myFunction()">OK</button>
        
        <p> If the number is less than 100 or higher than 300, an error message will be displayed.</p>
        <p id="demo"></p>
        <script>
            function myFunction() {
                var v = document.getElementById("num");
                if (!v.checkValidity()) {
                    document.getElementById("demo").innerHTML = v.validationMessage;
                } else {
                    document.getElementById("demo").innerHTML = "input ok";
                }}
        </script>
    </body>
</html>
